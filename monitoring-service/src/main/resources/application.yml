server:
  port: 8083

spring:
  application:
    name: monitoring-service

services:
  agent-orchestrator:
    url: ${AGENT_ORCHESTRATOR_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
