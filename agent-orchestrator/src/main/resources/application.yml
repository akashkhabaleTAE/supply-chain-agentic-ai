server:
  port: 8081

spring:
  application:
    name: agent-orchestrator

services:
  data-service:
    url: ${DATA_SERVICE_URL:http://localhost:8082}
  optimization-service:
    url: ${OPTIMIZATION_SERVICE_URL:http://localhost:8084}

ai:
  provider: ${AI_PROVIDER:local}
  openai:
    model: ${OPENAI_MODEL:gpt-4o}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
