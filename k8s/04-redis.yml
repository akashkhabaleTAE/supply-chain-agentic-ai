apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: supply-chain-agentic-ai
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
