apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-service
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: data-service
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-service
        app.kubernetes.io/part-of: supply-chain-agentic-ai
    spec:
      containers:
        - name: data-service
          image: supply-chain-agentic-ai/data-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: supply-chain-config
            - secretRef:
                name: supply-chain-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 75
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: data-service
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: data-service
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: data-service
  ports:
    - name: http
      port: 8082
      targetPort: http
