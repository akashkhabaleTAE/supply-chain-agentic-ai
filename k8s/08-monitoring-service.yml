apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-service
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: monitoring-service
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monitoring-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitoring-service
        app.kubernetes.io/part-of: supply-chain-agentic-ai
    spec:
      containers:
        - name: monitoring-service
          image: supply-chain-agentic-ai/monitoring-service:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8083
          envFrom:
            - configMapRef:
                name: supply-chain-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 35
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 70
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: monitoring-service
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: monitoring-service
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: monitoring-service
  ports:
    - name: http
      port: 8083
      targetPort: http
