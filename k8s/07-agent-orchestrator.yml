apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-orchestrator
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: agent-orchestrator
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-orchestrator
        app.kubernetes.io/part-of: supply-chain-agentic-ai
    spec:
      containers:
        - name: agent-orchestrator
          image: supply-chain-agentic-ai/agent-orchestrator:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: supply-chain-config
            - secretRef:
                name: supply-chain-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 35
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 70
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: agent-orchestrator
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: agent-orchestrator
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-orchestrator
  ports:
    - name: http
      port: 8081
      targetPort: http
