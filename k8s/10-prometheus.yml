apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: supply-chain-agentic-ai
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: gateway-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["gateway-service:8080"]

      - job_name: agent-orchestrator
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["agent-orchestrator:8081"]

      - job_name: data-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["data-service:8082"]

      - job_name: monitoring-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["monitoring-service:8083"]

      - job_name: optimization-service
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["optimization-service:8084"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: supply-chain-agentic-ai
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - name: http
              containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: supply-chain-ai
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: supply-chain-agentic-ai
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
