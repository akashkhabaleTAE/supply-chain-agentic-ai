services:
  - type: web
    name: supply-chain-agentic-ai-data
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./data-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=20.0

  - type: web
    name: supply-chain-agentic-ai-optimization
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./optimization-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=20.0

  - type: web
    name: supply-chain-agentic-ai-agent
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./agent-orchestrator/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: DATA_SERVICE_URL
        value: https://supply-chain-agentic-ai-data.onrender.com
      - key: OPTIMIZATION_SERVICE_URL
        value: https://supply-chain-agentic-ai-optimization.onrender.com
      - key: AI_PROVIDER
        value: local
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=20.0

  - type: web
    name: supply-chain-agentic-ai-monitoring
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./monitoring-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: AGENT_ORCHESTRATOR_URL
        value: https://supply-chain-agentic-ai-agent.onrender.com
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=20.0

  - type: web
    name: supply-chain-agentic-ai-gateway
    runtime: docker
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    dockerfilePath: ./gateway-service/Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    envVars:
      - key: AGENT_ORCHESTRATOR_URL
        value: https://supply-chain-agentic-ai-agent.onrender.com
      - key: DATA_SERVICE_URL
        value: https://supply-chain-agentic-ai-data.onrender.com
      - key: MONITORING_SERVICE_URL
        value: https://supply-chain-agentic-ai-monitoring.onrender.com
      - key: OPTIMIZATION_SERVICE_URL
        value: https://supply-chain-agentic-ai-optimization.onrender.com
      - key: GATEWAY_CORS_ALLOWED_ORIGINS
        value: https://supply-chain-agentic-ai-dashboard.onrender.com,http://localhost:3000,http://127.0.0.1:3000
      - key: GATEWAY_DEMO_USERNAME
        value: akash
      - key: GATEWAY_DEMO_PASSWORD
        value: supplychain2026
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_TTL
        value: 8h
      - key: JAVA_OPTS
        value: -XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=20.0

  - type: web
    name: supply-chain-agentic-ai-dashboard
    runtime: static
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://supply-chain-agentic-ai-gateway.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
