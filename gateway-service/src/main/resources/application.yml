server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.reactive.ReactiveUserDetailsServiceAutoConfiguration
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Gateway-Service, supply-chain-gateway
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
              - "https://supply-chain-agentic-ai-dashboard.onrender.com"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Authorization
              - X-Authenticated-User
            allowCredentials: true
      routes:
        - id: agent-orchestrator
          uri: ${AGENT_ORCHESTRATOR_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/**
        - id: agent-orchestrator-docs
          uri: ${AGENT_ORCHESTRATOR_URL:http://localhost:8081}
          predicates:
            - Path=/docs/agent-orchestrator/**
          filters:
            - StripPrefix=2
        - id: data-service
          uri: ${DATA_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/data/**
        - id: data-service-docs
          uri: ${DATA_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/docs/data-service/**
          filters:
            - StripPrefix=2
        - id: monitoring-service
          uri: ${MONITORING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/monitoring/**
        - id: monitoring-service-docs
          uri: ${MONITORING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/docs/monitoring-service/**
          filters:
            - StripPrefix=2
        - id: optimization-service
          uri: ${OPTIMIZATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/optimization/**
        - id: optimization-service-docs
          uri: ${OPTIMIZATION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/docs/optimization-service/**
          filters:
            - StripPrefix=2

security:
  jwt:
    enabled: ${JWT_ENABLED:true}
    secret: ${JWT_SECRET:supplychain2026-supplychain2026-supplychain2026}
    ttl: ${JWT_TTL:8h}
    issuer: supply-chain-agentic-ai
    demo-username: ${GATEWAY_DEMO_USERNAME:akash}
    demo-password: ${GATEWAY_DEMO_PASSWORD:supplychain2026}
    public-paths:
      - /actuator/health
      - /actuator/info
      - /api/docs
      - /api/swagger-ui
      - /api/webjars
      - /api/v3/api-docs
      - /swagger-ui
      - /webjars
      - /v3/api-docs
      - /docs
      - /auth/token

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /api/docs
    urls:
      - name: agent-orchestrator
        url: /docs/agent-orchestrator/v3/api-docs
      - name: data-service
        url: /docs/data-service/v3/api-docs
      - name: monitoring-service
        url: /docs/monitoring-service/v3/api-docs
      - name: optimization-service
        url: /docs/optimization-service/v3/api-docs
  api-docs:
    path: /v3/api-docs
